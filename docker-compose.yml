services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fledger
      POSTGRES_USER: fledger
      POSTGRES_PASSWORD: fledger-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fledger"]
      interval: 2s
      retries: 10
    ports:
      - "5432:5432"

  api:
    image: ${API_IMAGE:-fledger-api:candidate}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG_FILE: application.conf
      JAVA_TOOL_OPTIONS: -Ddb.host=postgres
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/openapi.yaml > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-fledger-web:candidate}
    depends_on:
      api:
        condition: service_healthy
    environment:
      REACT_APP_API_GATEWAY_URL: http://localhost:${API_PORT:-8080}
    ports:
      - "3200:80"
